version: '3.9'

services:
  # ─── MongoDB ─────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: soteria_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: soteria_loto
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    container_name: soteria_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/soteria_loto
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      STORAGE_PROVIDER: local
      LOCAL_UPLOAD_DIR: /app/uploads
      QR_BASE_URL: ${QR_BASE_URL:-http://localhost:3000/q}
    volumes:
      - backend_uploads:/app/uploads

  # ─── Web Admin ────────────────────────────────────────────
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: soteria_web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:4000/api/v1

volumes:
  mongo_data:
  backend_uploads:
